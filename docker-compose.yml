services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://pulselink:pulselink@mysql:3306/pulselink}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QUEUE_NAME: ${QUEUE_NAME:-pulselink}
      RUN_ANALYSIS_INLINE: ${RUN_ANALYSIS_INLINE:-false}
      ARTIFACT_DIR: ${ARTIFACT_DIR:-/tmp/pulselink-artifacts}
      LOCAL_FILE_ROOT: ${LOCAL_FILE_ROOT:-/app}
      PDF_MAX_PAGES: ${PDF_MAX_PAGES:-120}
      PDF_MAX_SIZE_MB: ${PDF_MAX_SIZE_MB:-50}
      STEP_TIMEOUT_SECONDS: ${STEP_TIMEOUT_SECONDS:-300}
      MAX_RETRY_ATTEMPTS: ${MAX_RETRY_ATTEMPTS:-3}
      ENABLE_VISION: ${ENABLE_VISION:-true}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
      COS_ENDPOINT: ${COS_ENDPOINT:-http://minio:9000}
      COS_BUCKET: ${COS_BUCKET:-pulselink-local}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      VISION_API_BASE: ${VISION_API_BASE:-}
      VISION_API_KEY: ${VISION_API_KEY:-}
      VISION_MODEL: ${VISION_MODEL:-}
    volumes:
      - ./backend:/app/backend
      - ./多线程DSP智能终端芯片_202603_副本.pdf:/app/多线程DSP智能终端芯片_202603_副本.pdf:ro
      - ./追光科技A+轮融资商业计划书260226_副本.pdf:/app/追光科技A+轮融资商业计划书260226_副本.pdf:ro
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: rq worker pulselink --url redis://redis:6379/0
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://pulselink:pulselink@mysql:3306/pulselink}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QUEUE_NAME: ${QUEUE_NAME:-pulselink}
      RUN_ANALYSIS_INLINE: ${RUN_ANALYSIS_INLINE:-false}
      ARTIFACT_DIR: ${ARTIFACT_DIR:-/tmp/pulselink-artifacts}
      LOCAL_FILE_ROOT: ${LOCAL_FILE_ROOT:-/app}
      PDF_MAX_PAGES: ${PDF_MAX_PAGES:-120}
      PDF_MAX_SIZE_MB: ${PDF_MAX_SIZE_MB:-50}
      STEP_TIMEOUT_SECONDS: ${STEP_TIMEOUT_SECONDS:-300}
      MAX_RETRY_ATTEMPTS: ${MAX_RETRY_ATTEMPTS:-3}
      ENABLE_VISION: ${ENABLE_VISION:-true}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
      COS_ENDPOINT: ${COS_ENDPOINT:-http://minio:9000}
      COS_BUCKET: ${COS_BUCKET:-pulselink-local}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      VISION_API_BASE: ${VISION_API_BASE:-}
      VISION_API_KEY: ${VISION_API_KEY:-}
      VISION_MODEL: ${VISION_MODEL:-}
    volumes:
      - ./backend:/app/backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: pulselink
      MYSQL_USER: pulselink
      MYSQL_PASSWORD: pulselink
      MYSQL_ROOT_PASSWORD: pulselink_root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-upulselink", "-ppulselink"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pulselink
      MINIO_ROOT_PASSWORD: pulselink_local_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  minio_data:
